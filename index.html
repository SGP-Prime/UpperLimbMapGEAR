<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEAR — Brachial plexus block map</title>
<style>
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
  font-family: 'Nunito Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  background: #f7fbfc;
  color: #1a2e35;
  overscroll-behavior: none;
}

body { display: flex; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 320px;
  background: white;
  padding: 18px 20px 22px;
  overflow-y: auto;
  border-right: 1px solid #d0e8ec;
  flex-shrink: 0;
  height: 100vh;
}

.drawer-handle { display: none; }

.sidebar h3 {
  margin: 0 0 12px;
  color: #0d4f56;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.sidebar h4 {
  margin: 14px 0 4px;
  color: #5a7a82;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.4px;
}

.sidebar .footnote {
  margin-top: 22px;
  padding-top: 12px;
  border-top: 1px solid #d0e8ec;
  font-size: 10.5px;
  color: #5a7a82;
  line-height: 1.45;
}

/* ===== PRESETS ===== */
.presets {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid #d0e8ec;
}

.presets button {
  padding: 5px 11px;
  border: 1px solid #14707a;
  background: white;
  color: #14707a;
  border-radius: 14px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  transition: all 0.15s;
}

.presets button:hover { background: #14707a; color: white; }
.presets button:active { background: #0d4f56; }

/* ===== BLOCK ITEMS ===== */
.block-group { margin-bottom: 2px; }

.block-item {
  display: flex;
  align-items: center;
  padding: 4px 6px;
  cursor: pointer;
  border-radius: 4px;
  font-size: 12.5px;
  user-select: none;
  transition: background 0.1s;
}

.block-item:hover { background: #f0f8fa; }

.block-item input[type="checkbox"] {
  margin: 0 8px 0 0;
  cursor: pointer;
  accent-color: #14707a;
}

.block-color {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: 3px;
  margin-right: 8px;
  flex-shrink: 0;
  border: 1px solid rgba(0,0,0,0.12);
}

.block-name { flex: 1; }

/* ===== MAP AREA — pan/zoom ===== */
.map-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #eef4f6;
  min-width: 0;
  height: 100vh;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

.map-area > svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  cursor: grab;
  /* viewBox is mutated in JS for pan/zoom — keeps rendering vector-crisp */
}

.map-area > svg:active { cursor: grabbing; }

/* Reset-zoom button */
.zoom-reset {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid #d0e8ec;
  background: white;
  color: #14707a;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  padding: 0;
}

.zoom-reset:hover { background: #f0f8fa; }
.zoom-reset:active { background: #e0f0f4; }
.zoom-reset svg { width: 20px; height: 20px; display: block; }

/* ===== DRAWER (mobile) ===== */
.drawer-toggle {
  display: none;
  position: fixed;
  bottom: 16px;
  right: 16px;
  background: #14707a;
  color: white;
  border: none;
  border-radius: 28px;
  padding: 12px 22px;
  font-weight: 700;
  font-family: inherit;
  font-size: 14px;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 16px rgba(20, 112, 122, 0.3);
  cursor: pointer;
  z-index: 50;
}

.drawer-toggle:active { background: #0d4f56; }

.drawer-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  z-index: 90;
}

.drawer-backdrop.show { display: block; }

/* ===== MOBILE LAYOUT ===== */
@media (max-width: 700px) {
  body { display: block; }

  .map-area {
    position: fixed;
    inset: 0;
    height: 100vh;
    height: 100dvh;
    padding: 0;
  }

  .sidebar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 78vh;
    height: 78dvh;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    border-right: none;
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    padding-top: 4px;
    z-index: 100;
  }

  .sidebar.open { transform: translateY(0); }

  .drawer-handle {
    display: block;
    width: 40px;
    height: 4px;
    background: #d0e8ec;
    border-radius: 2px;
    margin: 6px auto 14px;
  }

  .drawer-toggle { display: block; }

  .zoom-reset {
    bottom: 76px;
    top: auto;
    right: 16px;
  }

  /* Bigger touch targets on mobile */
  .block-item {
    min-height: 44px;
    padding: 8px 6px;
    font-size: 14px;
  }

  .block-item input[type="checkbox"] {
    transform: scale(1.25);
    margin-right: 12px;
  }

  .presets button {
    padding: 8px 14px;
    font-size: 12.5px;
  }
}
</style>

          <button data-preset="distal">Distal only</button>
          <button data-preset="selective">Selective branches</button>
    </div>
        <div class="block-group">
          <h4>Proximal plexus</h4>
          <label class="block-item"><input type="checkbox" data-block="isb" checked><span class="block-color" style="background:#F77F00"></span><span class="block-name">Interscalene block</span></label>
          <label class="block-item"><input type="checkbox" data-block="stb" checked><span class="block-color" style="background:#DC4900"></span><span class="block-name">Superior trunk block</span></label>
          <label class="block-item"><input type="checkbox" data-block="ssnb" checked><span class="block-color" style="background:#FFA94D"></span><span class="block-name">Suprascapular nerve block</span></label>
        </div>
        <div class="block-group">
          <h4>Supraclavicular</h4>
          <label class="block-item"><input type="checkbox" data-block="sc" checked><span class="block-color" style="background:#D62976"></span><span class="block-name">Supraclavicular block</span></label>
        </div>
        <div class="block-group">
          <h4>Cords (infraclavicular)</h4>
          <label class="block-item"><input type="checkbox" data-block="lsib" checked><span class="block-color" style="background:#9D4EDD"></span><span class="block-name">Infraclavicular block (LSIB)</span></label>
          <label class="block-item"><input type="checkbox" data-block="ccb" checked><span class="block-color" style="background:#5A189A"></span><span class="block-name">Costoclavicular block</span></label>
        </div>
        <div class="block-group">
          <h4>Axilla / terminal nerves</h4>
          <label class="block-item"><input type="checkbox" data-block="axb" checked><span class="block-color" style="background:#023E8A"></span><span class="block-name">Axillary brachial plexus block</span></label>
          <label class="block-item"><input type="checkbox" data-block="anb" checked><span class="block-color" style="background:#0077B6"></span><span class="block-name">Axillary nerve block (selective)</span></label>
          <label class="block-item"><input type="checkbox" data-block="itm" checked><span class="block-color" style="background:#03045E"></span><span class="block-name">ITM plane block</span></label>
          <label class="block-item"><input type="checkbox" data-block="icbn" checked><span class="block-color" style="background:#48CAE4"></span><span class="block-name">Intercostobrachial nerve block</span></label>
        </div>
        <div class="block-group">
          <h4>Upper arm</h4>
          <label class="block-item"><input type="checkbox" data-block="midhum" checked><span class="block-color" style="background:#2A9D8F"></span><span class="block-name">Mid-humeral / humeral canal</span></label>
        </div>
        <div class="block-group">
          <h4>Elbow</h4>
          <label class="block-item"><input type="checkbox" data-block="melb" checked><span class="block-color" style="background:#6A0F0F"></span><span class="block-name">Median nerve at elbow</span></label>
          <label class="block-item"><input type="checkbox" data-block="relb" checked><span class="block-color" style="background:#C1121F"></span><span class="block-name">Radial nerve at elbow</span></label>
          <label class="block-item"><input type="checkbox" data-block="uelb" checked><span class="block-color" style="background:#E63946"></span><span class="block-name">Ulnar nerve at elbow</span></label>
          <label class="block-item"><input type="checkbox" data-block="lcnf" checked><span class="block-color" style="background:#FF1493"></span><span class="block-name">LCNF (terminal MCN)</span></label>
        </div>
        <div class="block-group">
          <h4>Forearm</h4>
          <label class="block-item"><input type="checkbox" data-block="mfa" checked><span class="block-color" style="background:#4A6B2A"></span><span class="block-name">Median nerve at forearm</span></label>
          <label class="block-item"><input type="checkbox" data-block="ufa" checked><span class="block-color" style="background:#5C8001"></span><span class="block-name">Ulnar nerve at forearm</span></label>
          <label class="block-item"><input type="checkbox" data-block="radfa" checked><span class="block-color" style="background:#8B9A3E"></span><span class="block-name">Radial nerve at forearm</span></label>
          <label class="block-item"><input type="checkbox" data-block="pin" checked><span class="block-color" style="background:#C0CB31"></span><span class="block-name">PIN (deep radial)</span></label>
        </div>
        <div class="block-group">
          <h4>Hand / digital</h4>
          <label class="block-item"><input type="checkbox" data-block="digital" checked><span class="block-color" style="background:#6F4E37"></span><span class="block-name">Digital nerve block</span></label>
        </div>
    <p class="footnote">
      Toggle individual blocks or apply presets to overlay ultrasound-guided
      block coverage on the brachial plexus schematic.
    </p>

  <div class="drawer-backdrop" aria-hidden="true"></div>

<script>
(() => {
  const PRESETS = {"all": ["isb", "stb", "ssnb", "sc", "lsib", "ccb", "axb", "anb", "itm", "icbn", "midhum", "melb", "relb", "uelb", "lcnf", "mfa", "ufa", "radfa", "pin", "digital"], "none": [], "plan-a": ["isb", "axb"], "plexus": ["isb", "sc", "lsib", "ccb", "axb"], "diaphragm-sparing": ["stb", "ssnb", "anb", "itm", "ccb"], "distal": ["melb", "relb", "uelb", "lcnf", "mfa", "ufa", "radfa", "pin", "digital"], "selective": ["ssnb", "anb", "itm", "icbn", "lcnf", "pin"]};

  // ===== Block toggles =====
  function setBlockVisible(blockId, visible) {
    const display = visible ? '' : 'none';
    ['boxes', 'pills'].forEach(suffix => {
      const el = document.getElementById(`block-${blockId}-${suffix}`);
      if (el) el.style.display = display;
    });
  }

  function applyPreset(name) {
    const visible = new Set(PRESETS[name] || []);
    document.querySelectorAll('.block-item input[type="checkbox"]').forEach(cb => {
      const v = visible.has(cb.dataset.block);
      cb.checked = v;
      setBlockVisible(cb.dataset.block, v);
    });
  }

  document.querySelectorAll('.block-item input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => setBlockVisible(cb.dataset.block, cb.checked));
  });

  document.querySelectorAll('.presets button').forEach(btn => {
    btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
  });

  // ===== Drawer (mobile) =====
  const sidebar = document.querySelector('.sidebar');
  const drawerToggle = document.querySelector('.drawer-toggle');
  const backdrop = document.querySelector('.drawer-backdrop');
  function openDrawer() { sidebar.classList.add('open'); backdrop.classList.add('show'); }
  function closeDrawer() { sidebar.classList.remove('open'); backdrop.classList.remove('show'); }
  drawerToggle.addEventListener('click', openDrawer);
  backdrop.addEventListener('click', closeDrawer);

  // ===== Pan / pinch-zoom on the map (via SVG viewBox manipulation) =====
  // Mutating viewBox keeps every zoom level vector-crisp, unlike CSS
  // transform: scale() which rasterizes the SVG at its layout size and
  // scales the resulting bitmap.
  const mapArea = document.querySelector('.map-area');
  const svg = mapArea.querySelector('svg');
  const zoomReset = document.querySelector('.zoom-reset');

  // Capture the original viewBox as the "100% zoom" baseline
  const initialVb = svg.getAttribute('viewBox').split(/[\s,]+/).map(Number);
  const [I_VX, I_VY, I_VW, I_VH] = initialVb;
  let vx = I_VX, vy = I_VY, vw = I_VW, vh = I_VH;

  const MIN_SCALE = 0.5, MAX_SCALE = 12;     // 1× = original viewBox
  const clampScale = s => Math.max(MIN_SCALE, Math.min(MAX_SCALE, s));

  function applyViewBox() {
    svg.setAttribute('viewBox', `${vx} ${vy} ${vw} ${vh}`);
  }

  // Compute SVG element CSS box + letterbox offsets ('meet' aspect-fit).
  function viewMetrics() {
    const r = svg.getBoundingClientRect();
    const k = Math.min(r.width / vw, r.height / vh); // px per viewBox-unit
    const ox = (r.width  - k * vw) / 2;
    const oy = (r.height - k * vh) / 2;
    return { rect: r, k, ox, oy };
  }

  function clientToVb(clientX, clientY) {
    const m = viewMetrics();
    const sx = clientX - m.rect.left;
    const sy = clientY - m.rect.top;
    return {
      x: vx + (sx - m.ox) / m.k,
      y: vy + (sy - m.oy) / m.k,
      sx, sy, m,
    };
  }

  function pan(dxScreen, dyScreen) {
    const m = viewMetrics();
    vx -= dxScreen / m.k;
    vy -= dyScreen / m.k;
    applyViewBox();
  }

  function zoomAt(factor, clientX, clientY) {
    const before = clientToVb(clientX, clientY);
    const oldScale = I_VW / vw;
    const newScale = clampScale(oldScale * factor);
    const realFactor = newScale / oldScale;
    if (realFactor === 1) return;
    vw = I_VW / newScale;
    vh = I_VH / newScale;
    // Letterbox offsets are unchanged because aspect is preserved.
    const newK = before.m.k * realFactor;
    vx = before.x - (before.sx - before.m.ox) / newK;
    vy = before.y - (before.sy - before.m.oy) / newK;
    applyViewBox();
  }

  function resetView() {
    vx = I_VX; vy = I_VY; vw = I_VW; vh = I_VH;
    applyViewBox();
  }
  zoomReset.addEventListener('click', resetView);

  // Pointer events (touch + mouse + pen)
  const pointers = new Map();

  mapArea.addEventListener('pointerdown', e => {
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    try { mapArea.setPointerCapture(e.pointerId); } catch (_) {}
  });

  mapArea.addEventListener('pointermove', e => {
    if (!pointers.has(e.pointerId)) return;
    const prevAll = new Map();
    for (const [id, pos] of pointers) prevAll.set(id, { x: pos.x, y: pos.y });
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (pointers.size === 1) {
      const prev = prevAll.get(e.pointerId);
      pan(e.clientX - prev.x, e.clientY - prev.y);
    } else if (pointers.size >= 2) {
      const prevPts = [...prevAll.values()].slice(0, 2);
      const newPts  = [...pointers.values()].slice(0, 2);
      const prevMid = { x: (prevPts[0].x + prevPts[1].x) / 2, y: (prevPts[0].y + prevPts[1].y) / 2 };
      const newMid  = { x: (newPts[0].x + newPts[1].x) / 2,   y: (newPts[0].y + newPts[1].y) / 2   };
      const prevDist = Math.hypot(prevPts[0].x - prevPts[1].x, prevPts[0].y - prevPts[1].y) || 1;
      const newDist  = Math.hypot(newPts[0].x - newPts[1].x,   newPts[0].y - newPts[1].y);

      // Pan by midpoint delta first
      pan(newMid.x - prevMid.x, newMid.y - prevMid.y);
      // Then zoom anchored at new midpoint
      zoomAt(newDist / prevDist, newMid.x, newMid.y);
    }
  });

  function endPointer(e) { pointers.delete(e.pointerId); }
  mapArea.addEventListener('pointerup', endPointer);
  mapArea.addEventListener('pointercancel', endPointer);

  // Mouse wheel + trackpad pinch-zoom
  mapArea.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = Math.exp(-e.deltaY * 0.005);
    zoomAt(factor, e.clientX, e.clientY);
  }, { passive: false });

  // Double-click / double-tap to reset
  mapArea.addEventListener('dblclick', resetView);
})();
</script>
